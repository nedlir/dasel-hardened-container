contents:
  keyring:
    - keys/melange.rsa.pub
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
    - ./packages
    - https://packages.wolfi.dev/os
  packages:
    - dasel
    - ca-certificates-bundle

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

archs:
  - x86_64

entrypoint:
  command: /usr/bin/dasel
